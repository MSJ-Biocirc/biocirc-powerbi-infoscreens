<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8" />
<title>BioCirc Power BI Infoscreen</title>

<style>

html,body{
margin:0;
padding:0;
background:black;
overflow:hidden;
font-family:Segoe UI;
}

iframe{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
border:none;
display:none;
}

#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:26px;
opacity:0.7;
}

#error{
position:absolute;
top:20px;
left:20px;
color:white;
background:#900;
padding:15px;
font-size:18px;
display:none;
z-index:100;
}

</style>

</head>

<body>

<div id="loading">Loading reports...</div>
<div id="error"></div>

<div id="frames"></div>

<script>

//////////////////////////////////////////////////////
// KONFIG
//////////////////////////////////////////////////////

const tenantId = "884bfe45-dede-4490-9006-35f088544fba";
const defaultSite = "iglsoe";
const configFolder = "configs";

const embedParams =
"&navContentPaneEnabled=false"+
"&filterPaneEnabled=false"+
"&actionBarEnabled=false"+
"&viewMode=fitToPage";

//////////////////////////////////////////////////////
// HJÆLPERE
//////////////////////////////////////////////////////

function getSiteFromUrl(){

const p = new URLSearchParams(window.location.search);
return (p.get("site") || defaultSite).toLowerCase();

}

function buildEmbedUrl(item){

let url =
`https://app.fabric.microsoft.com/reportEmbed?`+
`reportId=${encodeURIComponent(item.reportId)}`+
`&groupId=${encodeURIComponent(item.groupId)}`+
`&autoAuth=true`+
`&ctid=${encodeURIComponent(tenantId)}`;

url += embedParams;

if(item.pageName && item.pageName.trim() !== ""){
url += "&pageName="+encodeURIComponent(item.pageName);
}

return url;

}

function showError(msg){

const el=document.getElementById("error");
el.innerHTML=msg;
el.style.display="block";

}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

//////////////////////////////////////////////////////
// MAIN
//////////////////////////////////////////////////////

(async function(){

const site = getSiteFromUrl();
const configPath = `${configFolder}/${site}.json`;

console.log("Loading site:",site);

let config;

try{

const res = await fetch(configPath,{cache:"no-store"});

if(!res.ok) throw new Error("HTTP "+res.status);

config = await res.json();

}
catch(e){

console.error(e);

showError(`
<h2>Kunne ikke loade config</h2>
<p>${configPath}</p>
`);

return;

}

const rotateSeconds = Number(config.rotateSeconds || 30);
const refreshMinutes = Number(config.refreshMinutes || 30);
const items = Array.isArray(config.items)?config.items:[];

if(items.length === 0){

showError(`
<h2>Ingen rapporter i config</h2>
<p>${configPath}</p>
`);

return;

}

console.log("Reports loaded:",items.length);

//////////////////////////////////////////////////////
// OPRET IFRAMES
//////////////////////////////////////////////////////

const framesDiv = document.getElementById("frames");

let frames = [];

items.forEach((item)=>{

const iframe = document.createElement("iframe");

iframe.src = buildEmbedUrl(item);

framesDiv.appendChild(iframe);

frames.push(iframe);

});

//////////////////////////////////////////////////////
// PRELOAD ALLE RAPPORTER
//////////////////////////////////////////////////////

console.log("Preloading reports...");

await sleep(20000);

document.getElementById("loading").style.display="none";

frames[0].style.display="block";

//////////////////////////////////////////////////////
// ROTATION (INSTANT)
//////////////////////////////////////////////////////

let currentIndex = 0;

function rotate(){

frames[currentIndex].style.display="none";

currentIndex++;

if(currentIndex >= frames.length){
currentIndex = 0;
}

frames[currentIndex].style.display="block";

}

//////////////////////////////////////////////////////
// BAGGRUNDS REFRESH
//////////////////////////////////////////////////////

async function refreshReports(){

console.log("Background refresh starting");

for(let i=0;i<frames.length;i++){

if(i === currentIndex) continue;

const frame = frames[i];
const url = frame.src;

frame.src="about:blank";

await sleep(1000);

frame.src=url;

await sleep(4000);

}

console.log("Background refresh done");

}

//////////////////////////////////////////////////////
// TIMERS
//////////////////////////////////////////////////////

setInterval(rotate, rotateSeconds*1000);

setInterval(refreshReports, refreshMinutes*60*1000);

console.log(`
Infoscreen started
site: ${site}
reports: ${items.length}
rotate: ${rotateSeconds}s
refresh: ${refreshMinutes}m
`);

})();

</script>

</body>
</html>
